<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threa Backoffice</title>
    <meta name="description" content="Threa platform administration" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Favicon: 8-pointed mandala — distinct from the main app's vesica +
         thread shape, so the admin tab is recognisable in the browser tab
         strip without needing color tricks. SVG with no background fill,
         so the same file works on light and dark browser chrome.
         The two admin-icon-*.svg variants are higher-res app icons with
         opaque backgrounds, used for the iOS home-screen apple-touch-icon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon-admin.svg" />
    <link rel="apple-touch-icon" href="/admin-icon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/admin-icon-light.svg" media="(prefers-color-scheme: light)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      ;(function () {
        var root = document.documentElement
        var prefs
        try {
          prefs = JSON.parse(localStorage.getItem("threa-backoffice-appearance")) || {}
        } catch (e) {
          prefs = {}
        }
        var theme = prefs.theme
        var prefersDark =
          theme === "dark" || (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)
        if (prefersDark) root.classList.add("dark")
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
