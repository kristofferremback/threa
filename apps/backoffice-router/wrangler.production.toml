name = "backoffice-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
# Production control-plane (shared with workspace-router).
CONTROL_PLANE_URL = "https://control-plane-production-7495.up.railway.app"
# CF Pages project that serves the backoffice static assets. Leave unset to
# serve only the API and 404 everything else (useful if the Cloudflare Route
# pattern is scoped to `/api/*` rather than `/*`).
PAGES_PROJECT = "threa-backoffice"

# Cloudflare Route binding (configure in the Cloudflare dashboard):
#   admin.threa.io/*  →  backoffice-router
# Everything under /api/* is proxied to the control-plane by this worker.
# Non-/api requests are proxied to the CF Pages deployment of @threa/backoffice.
