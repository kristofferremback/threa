name = "workspace-router-staging"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "WORKSPACE_REGIONS"
id = "ab43236b60bd44e08741917db834ba08"

[vars]
# Empty default — staging regions are managed dynamically via KV (__regions_config__ key)
REGIONS = '{}'
USE_KV_REGIONS = "true"
PAGES_PROJECT = "threa-staging"
STAGING_DOMAIN = "staging.threa.io"
WS_STAGING_DOMAIN = "ws-staging.threa.io"
CONTROL_PLANE_URL = "https://control-plane-production-abf8.up.railway.app"
# INTERNAL_API_KEY is set via: bunx wrangler secret put INTERNAL_API_KEY --config wrangler.staging.toml
