name = "workspace-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "WORKSPACE_REGIONS"
id = "workspace-regions-kv"

[vars]
REGIONS = '{"local":{"apiUrl":"http://localhost:3002","wsUrl":"ws://localhost:3002"}}'
CONTROL_PLANE_URL = "http://localhost:3003"
INTERNAL_API_KEY = "dev-internal-key"

[dev]
port = 3001
ip = "0.0.0.0"
