name: Staging

on:
  pull_request:
    types: [opened, synchronize, reopened, closed, labeled, unlabeled]
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy staging
    if: |
      github.event.action != 'closed' &&
      github.event.action != 'unlabeled' &&
      contains(github.event.pull_request.labels.*.name, 'staging')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run --cwd apps/frontend build

      - name: Deploy frontend to CF Pages
        run: bunx wrangler pages deploy apps/frontend/dist --project-name threa-staging --branch pr-${{ github.event.pull_request.number }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Deploy PR backend + database
        run: bun scripts/staging-pr.ts --action=deploy --pr=${{ github.event.pull_request.number }} --branch="$BRANCH_NAME"
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_KV_NAMESPACE_ID: ${{ secrets.STAGING_KV_NAMESPACE_ID }}
          STAGING_INTERNAL_API_KEY: ${{ secrets.STAGING_INTERNAL_API_KEY }}
          STAGING_CONTROL_PLANE_URL: ${{ secrets.STAGING_CONTROL_PLANE_URL }}
          STAGING_CORS_ORIGINS: "https://pr-${{ github.event.pull_request.number }}-staging.threa.io,https://staging.threa.io"
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BRANCH_NAME: ${{ github.head_ref }}

      - name: Notify Threa channel
        continue-on-error: true
        env:
          THREA_BOT_API_KEY: ${{ secrets.THREA_BOT_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          STAGING_URL="https://pr-${PR_NUMBER}-staging.threa.io"

          # Skip if we've already posted a notification for this staging URL
          SEARCH=$(curl -s -X POST \
            "https://app.threa.io/api/v1/workspaces/ws_01KJDZZV5H57W3H2SJ11PA554B/messages/search" \
            -H "Authorization: Bearer $THREA_BOT_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$STAGING_URL" '{"query": $q, "streams": ["stream_01KP36GA56WZREGN6VTKREWRM9"], "semantic": false, "limit": 1}')") || true
          if [[ "$(echo "$SEARCH" | jq -r 'if .data then (.data | length > 0) else false end' 2>/dev/null)" == "true" ]]; then
            echo "Already notified for $STAGING_URL — skipping"
            exit 0
          fi

          MESSAGE=$(printf '🚀 **Staging deployed** — [%s](%s)\n\n%s' \
            "$PR_TITLE" "$PR_URL" "$STAGING_URL")
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{"content": $content}')
          curl -f --show-error -X POST \
            "https://app.threa.io/api/v1/workspaces/ws_01KJDZZV5H57W3H2SJ11PA554B/streams/stream_01KP36GA56WZREGN6VTKREWRM9/messages" \
            -H "Authorization: Bearer $THREA_BOT_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Comment PR with staging URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const frontendUrl = `https://pr-${prNumber}-staging.threa.io`;
            const body = [
              '## Staging Environment',
              '',
              `**Frontend:** ${frontendUrl}`,
              `**Region:** pr-${prNumber}`,
              '',
              'Open the frontend URL on your phone to test. Login via WorkOS.',
              '',
              '_This environment will be torn down when the PR is closed or the `staging` label is removed._',
            ].join('\n');

            // Find existing staging comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes('## Staging Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  teardown:
    name: Teardown staging
    if: |
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'staging')) ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Teardown PR environment
        run: bun scripts/staging-pr.ts --action=teardown --pr=${{ github.event.pull_request.number }}
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_KV_NAMESPACE_ID: ${{ secrets.STAGING_KV_NAMESPACE_ID }}
          STAGING_INTERNAL_API_KEY: ${{ secrets.STAGING_INTERNAL_API_KEY }}
          STAGING_CONTROL_PLANE_URL: ${{ secrets.STAGING_CONTROL_PLANE_URL }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
