name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint frontend
        run: bun run --cwd apps/frontend lint

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: threa
          POSTGRES_PASSWORD: threa
          POSTGRES_DB: threa
        ports:
          - 5454:5432
        options: >-
          --health-cmd "pg_isready -U threa -d threa"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create test databases
        run: |
          PGPASSWORD=threa psql -h localhost -p 5454 -U threa -d postgres -c "CREATE DATABASE threa_test;"
          PGPASSWORD=threa psql -h localhost -p 5454 -U threa -d postgres -c "CREATE DATABASE threa_control_plane_test;"

      - name: Start MinIO
        run: |
          docker run -d -p 9000:9000 --name minio \
            -e "MINIO_ROOT_USER=minioadmin" \
            -e "MINIO_ROOT_PASSWORD=minioadmin" \
            minio/minio server /data
          # Wait for MinIO to be ready
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i)"
            sleep 1
          done

      - name: Run backend tests
        run: bun run test
        env:
          TEST_DATABASE_URL: postgresql://threa:threa@localhost:5454/threa_test
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: threa-test-uploads
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin

      - name: Run backend integration tests
        run: bun run --cwd apps/backend test:integration tests/integration/
        env:
          TEST_DATABASE_URL: postgresql://threa:threa@localhost:5454/threa_test
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: threa-test-uploads
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin

      - name: Run control-plane tests
        run: bun run --cwd apps/control-plane test
        env:
          TEST_DATABASE_URL: postgresql://threa:threa@localhost:5454/threa_control_plane_test

      - name: Run workspace-router tests
        run: bun run --cwd apps/workspace-router test

      - name: Run frontend tests
        run: bun run --cwd apps/frontend test

  workos-permissions:
    name: WorkOS Permissions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for permission file changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            permissions:
              - 'packages/types/src/api-keys.ts'
              - 'scripts/sync-workos-permissions.ts'

      - name: Setup Bun
        if: github.event_name == 'push' || steps.filter.outputs.permissions == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: github.event_name == 'push' || steps.filter.outputs.permissions == 'true'
        run: bun install

      # On PRs: check for drift when permission files change
      - name: Check for permission drift
        if: github.event_name == 'pull_request' && steps.filter.outputs.permissions == 'true'
        run: bun run workos:check
        env:
          WORKOS_API_KEY: ${{ secrets.WORKOS_PROD_API_KEY }}

      # On every merge to main: sync permissions to production WorkOS
      - name: Sync permissions to WorkOS
        if: github.event_name == 'push'
        run: bun run workos:sync
        env:
          WORKOS_API_KEY: ${{ secrets.WORKOS_PROD_API_KEY }}
