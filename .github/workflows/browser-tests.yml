name: Browser E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "tests/browser/**"
      - "playwright.config.ts"
      - "scripts/test-silent.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/browser-tests.yml"

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    env:
      TOTAL_SHARDS: 3
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: threa
          POSTGRES_PASSWORD: threa
          POSTGRES_DB: threa
        ports:
          - 5454:5432
        options: >-
          --health-cmd "pg_isready -U threa -d threa"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          # Wait for MinIO to be ready
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 1
          done
          # Create the test bucket using mc client
          docker exec minio mc alias set local http://localhost:9000 minioadmin minioadmin
          docker exec minio mc mb local/threa-browser-test
          echo "Created bucket: threa-browser-test"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun run --bun playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run --bun playwright install chromium

      - name: Install Playwright system dependencies
        run: bun run --bun playwright install-deps chromium

      - name: Derive browser test database name
        run: |
          repo_name="$(basename "$GITHUB_WORKSPACE")"
          sanitized_repo_name="$(
            echo "$repo_name" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]/_/g; s/_+/_/g; s/^_+//; s/_+$//'
          )"
          db_name="${sanitized_repo_name:-threa}_browser_test_shard_${{ matrix.shard_index }}"
          echo "PLAYWRIGHT_TEST_DB_NAME=$db_name" >> "$GITHUB_ENV"
          echo "Using browser test database: $db_name"

      - name: Create test databases
        run: |
          # Backend test database
          exists="$(
            PGPASSWORD=threa psql -h localhost -p 5454 -U threa -d postgres -tAc \
              "SELECT 1 FROM pg_database WHERE datname='${PLAYWRIGHT_TEST_DB_NAME}'"
          )"
          if [ "$exists" != "1" ]; then
            PGPASSWORD=threa psql -h localhost -p 5454 -U threa -d postgres -c \
              "CREATE DATABASE ${PLAYWRIGHT_TEST_DB_NAME}"
          else
            echo "Database already exists: ${PLAYWRIGHT_TEST_DB_NAME}"
          fi

          # Control-plane test database
          cp_db="${PLAYWRIGHT_TEST_DB_NAME}_cp"
          cp_exists="$(
            PGPASSWORD=threa psql -h localhost -p 5454 -U threa -d postgres -tAc \
              "SELECT 1 FROM pg_database WHERE datname='${cp_db}'"
          )"
          if [ "$cp_exists" != "1" ]; then
            PGPASSWORD=threa psql -h localhost -p 5454 -U threa -d postgres -c \
              "CREATE DATABASE ${cp_db}"
          else
            echo "Database already exists: ${cp_db}"
          fi

      - name: Run browser tests
        id: initial-run
        continue-on-error: true
        run: bun run test:browser -- --reporter=line,blob --shard=${{ matrix.shard_index }}/${{ env.TOTAL_SHARDS }}
        env:
          CI: true
          PLAYWRIGHT_TEST_DB_NAME: ${{ env.PLAYWRIGHT_TEST_DB_NAME }}

      - name: Archive initial blob report before retry
        if: steps.initial-run.outcome == 'failure'
        run: |
          if [ -d blob-report ]; then
            mv blob-report blob-report-initial
          fi

      - name: Retry failed tests in isolation
        id: retry-run
        if: steps.initial-run.outcome == 'failure'
        continue-on-error: true
        run: |
          if [ ! -f test-results/.last-run.json ]; then
            echo "::warning::No .last-run.json found — skipping retry (likely an infra failure)"
            exit 1
          fi
          bun run test:browser -- --reporter=line,blob --last-failed --retries=0
        env:
          CI: true
          PLAYWRIGHT_TEST_DB_NAME: ${{ env.PLAYWRIGHT_TEST_DB_NAME }}

      - name: Write shard result marker
        if: always()
        run: |
          if [[ "${{ steps.initial-run.outcome }}" == "success" ]]; then
            result="passed"
          elif [[ "${{ steps.retry-run.outcome }}" == "success" ]]; then
            result="flaky"
          else
            result="failed"
          fi
          echo "$result" > shard-result.txt
          echo "Shard ${{ matrix.shard_index }} result: $result"

      - name: Upload initial blob report (when retry ran)
        uses: actions/upload-artifact@v4
        if: steps.initial-run.outcome == 'failure' && !cancelled()
        with:
          name: playwright-blob-report-shard-${{ matrix.shard_index }}-initial
          path: blob-report-initial/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-blob-report-shard-${{ matrix.shard_index }}
          path: blob-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload shard result marker
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shard-result-${{ matrix.shard_index }}
          path: shard-result.txt
          retention-days: 7

  evaluate-results:
    runs-on: ubuntu-latest
    needs: browser-tests
    if: always()
    steps:
      - name: Download shard result markers
        uses: actions/download-artifact@v4
        with:
          path: shard-results
          pattern: shard-result-*

      - name: Summarize results
        run: |
          echo "## Browser Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Shard | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          passed_count=0
          flaky_count=0
          failed_count=0

          # Derive shards from downloaded artifact directories so this stays
          # correct if TOTAL_SHARDS changes without touching evaluate-results.
          for result_file in shard-results/shard-result-*/shard-result.txt; do
            shard_num=$(basename "$(dirname "$result_file")" | sed 's/shard-result-//')
            result=$(cat "$result_file")

            case "$result" in
              passed) icon="✅"; passed_count=$((passed_count + 1)) ;;
              flaky)  icon="🌀"; flaky_count=$((flaky_count + 1)) ;;
              *)      icon="❌"; failed_count=$((failed_count + 1)) ;;
            esac

            echo "| $shard_num | $icon $result |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ $passed_count -eq 0 && $flaky_count -eq 0 && $failed_count -gt 0 ]]; then
            echo "⛔ All shards failed — likely an infra issue, not test failures." >> "$GITHUB_STEP_SUMMARY"
          elif [[ $failed_count -gt 0 && $flaky_count -gt 0 ]]; then
            echo "⚠️ Some confirmed failures. Some tests are flaky (passed on retry)." >> "$GITHUB_STEP_SUMMARY"
          elif [[ $failed_count -gt 0 ]]; then
            echo "⚠️ Some tests have confirmed failures (failed in isolation). Check the merged Playwright report." >> "$GITHUB_STEP_SUMMARY"
          elif [[ $flaky_count -gt 0 ]]; then
            echo "🌀 All failures were flaky — tests passed when retried in isolation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ All shards passed." >> "$GITHUB_STEP_SUMMARY"
          fi

  merge-playwright-reports:
    runs-on: ubuntu-latest
    needs: browser-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v4
        with:
          path: downloaded-blob-reports
          pattern: playwright-blob-report-*

      - name: Merge Playwright blob reports
        run: |
          mkdir -p all-blob-reports
          find downloaded-blob-reports -type f -name "*.zip" -exec cp {} all-blob-reports/ \;
          bunx playwright merge-reports --reporter html all-blob-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30
