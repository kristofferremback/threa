# WorkOS API Key Permissions
#
# Reference for configuring permissions in the WorkOS Dashboard:
#   Authorization > Configuration > Organization API key permissions
#
# Source of truth: packages/types/src/api-keys.ts (API_KEY_PERMISSIONS)
# Keep WorkOS dashboard in sync with that file when adding new permissions.

permissions:
  - name: Search messages
    slug: messages:search
    description: >
      Grants access to search messages in public streams in a workspace.
      Application level stream grants can extend permissions to private streams.
